# Configuração Global de Ambiente
# Este arquivo contém configurações comuns a todas as DAGs

environment: dev  # dev ou prod
dataset_prefix: "dev"  # Prefixo para datasets BigQuery (dev_bronze, dev_silver, dev_gold)

# Configurações padrão do Airflow
airflow:
  owner: "data_team"
  email: "data@company.com"
  default_view: "tree"
  catchup: false

  # Retry e timeout padrão
  default_retries: 1
  default_retry_delay_minutes: 5

  # Configurações de GCP
  gcp_project_id: "projeto-estudo-datalake"  # Mude para seu projeto
  gcp_conn_id: "google_cloud_default"
  bigquery_location: "US"
